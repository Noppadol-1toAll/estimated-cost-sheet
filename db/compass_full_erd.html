
<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Compass CRM — Full ERD</title>
<style>
  :root{ --bg:#f7f7f5; --panel:#ffffff; --ink:#1f2328; --muted:#6b7280; --line:#e5e7eb; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:'Inter',system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}
  #bar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;gap:10px;padding:0 14px;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);z-index:20}
  #bar h1{font-size:15px;font-weight:600;margin:0 8px 0 0}
  #bar .sub{font-size:12px;color:var(--muted)}
  #bar .sp{flex:1}
  button,select,input{font:inherit;font-size:13px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;padding:6px 10px;cursor:pointer}
  button:hover{background:#f0f0ee}
  input{cursor:text;min-width:180px}
  #legend{position:fixed;left:14px;bottom:14px;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:10px;padding:10px 12px;z-index:20;font-size:12px;max-width:230px}
  #legend b{font-weight:600}
  .lg{display:flex;align-items:center;gap:7px;margin:3px 0}
  .sw{width:12px;height:12px;border-radius:3px;flex:none}
  #hint{position:fixed;right:14px;bottom:14px;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:10px;padding:8px 12px;z-index:20;font-size:12px;color:var(--muted)}
  #stage{position:absolute;inset:52px 0 0 0;overflow:hidden;cursor:grab}
  #stage.drag{cursor:grabbing}
  #world{position:absolute;top:0;left:0;transform-origin:0 0}
  svg#edges{position:absolute;top:0;left:0;overflow:visible}
  .region{position:absolute;border:1.5px dashed; border-radius:14px}
  .region .rt{position:absolute;top:-12px;left:16px;background:var(--bg);padding:0 8px;font-size:13px;font-weight:600}
  .card{position:absolute;background:var(--panel);border:1px solid var(--line);border-radius:9px;box-shadow:0 1px 2px rgba(0,0,0,.05);overflow:hidden}
  .card .h{padding:6px 9px;font-weight:600;font-size:12.5px;color:#fff;display:flex;justify-content:space-between;gap:6px;align-items:center}
  .card .h .rc{font-weight:500;font-size:11px;opacity:.85}
  .card .r{display:flex;gap:6px;padding:2px 9px;font-size:11.5px;border-top:1px solid #f1f1ef;white-space:nowrap}
  .card .r .k{flex:none;width:13px;color:var(--muted)}
  .card .r .n{flex:1;overflow:hidden;text-overflow:ellipsis}
  .card .r .ref{color:var(--muted);font-size:11px}
  .card .r.pk .n{font-weight:600}
  .card .more{padding:3px 9px;font-size:11px;color:var(--muted);border-top:1px solid #f1f1ef}
  .card.dim{opacity:.18}
  .card.hot{outline:2px solid #111;outline-offset:1px}
  path.edge{fill:none;stroke:#9aa0a6;stroke-width:1;opacity:.12}
  path.edge.hot{stroke:#111;stroke-width:1.6;opacity:.9}
  path.edge.dim{opacity:.03}
  .badge{font-size:10px;padding:1px 5px;border-radius:6px;background:#eef;color:#334;border:1px solid #dde}
</style>
</head>

</div>

files","d":"SET NULL"},{"s":"lead_assessment_shares","t":"profiles","d":"CASCADE"},{"s":"lead_assessment_shares","t":"deals","d":"CASCADE"},{"s":"lead_assessment_shares","t":"lead_assessments","d":"CASCADE"},{"s":"lead_assessment_shares","t":"profiles","d":"CASCADE"},{"s":"lead_assessments","t":"deals","d":"CASCADE"},{"s":"lead_assessments","t":"lead_assessment_question_sets","d":"NO ACTION"},{"s":"lead_assessments","t":"lead_assessments","d":"SET NULL"},{"s":"lead_assessments","t":"profiles","d":"SET NULL"},{"s":"notification_dedup","t":"profiles","d":"CASCADE"},{"s":"notification_milestones","t":"profiles","d":"CASCADE"},{"s":"notifications","t":"profiles","d":"CASCADE"},{"s":"nwr_snapshots","t":"profiles","d":"CASCADE"},{"s":"organizations","t":"profiles","d":"SET NULL"},{"s":"organizations","t":"profiles","d":"RESTRICT"},{"s":"organizations","t":"payment_terms","d":"NO ACTION"},{"s":"pipeline_stages","t":"pipelines","d":"CASCADE"},{"s":"presales_task_attachments","t":"profiles","d":"NO ACTION"},{"s":"presales_task_attachments","t":"presales_tasks","d":"CASCADE"},{"s":"presales_task_comments","t":"presales_tasks","d":"CASCADE"},{"s":"presales_task_comments","t":"profiles","d":"SET NULL"},{"s":"presales_task_status_history","t":"presales_tasks","d":"CASCADE"},{"s":"presales_task_status_history","t":"profiles","d":"NO ACTION"},{"s":"presales_tasks","t":"presales_task_types","d":"NO ACTION"},{"s":"presales_tasks","t":"profiles","d":"SET NULL"},{"s":"presales_tasks","t":"deals","d":"SET NULL"},{"s":"presales_tasks","t":"profiles","d":"SET NULL"},{"s":"presales_tasks","t":"organizations","d":"SET NULL"},{"s":"profiles","t":"ecd_department_map","d":"NO ACTION"},{"s":"project_documents","t":"projects","d":"CASCADE"},{"s":"project_documents","t":"project_phases","d":"NO ACTION"},{"s":"project_documents","t":"profiles","d":"NO ACTION"},{"s":"project_history","t":"profiles","d":"SET NULL"},{"s":"project_milestones","t":"projects","d":"CASCADE"},{"s":"project_milestones","t":"project_phases","d":"NO ACTION"},{"s":"project_milestones","t":"profiles","d":"NO ACTION"},{"s":"project_milestones","t":"profiles","d":"NO ACTION"},{"s":"project_phase_status","t":"projects","d":"CASCADE"},{"s":"project_phase_status","t":"profiles","d":"NO ACTION"},{"s":"project_phase_status","t":"project_phases","d":"NO ACTION"},{"s":"project_risks_issues","t":"profiles","d":"NO ACTION"},{"s":"project_risks_issues","t":"profiles","d":"NO ACTION"},{"s":"project_risks_issues","t":"projects","d":"CASCADE"},{"s":"project_status_updates","t":"profiles","d":"NO ACTION"},{"s":"project_status_updates","t":"projects","d":"CASCADE"},{"s":"project_tasks","t":"profiles","d":"SET NULL"},{"s":"project_team_members","t":"projects","d":"CASCADE"},{"s":"project_team_members","t":"profiles","d":"CASCADE"},{"s":"projects","t":"profiles","d":"SET NULL"},{"s":"projects","t":"deals","d":"SET NULL"},{"s":"projects","t":"project_phases","d":"NO ACTION"},{"s":"projects","t":"profiles","d":"SET NULL"},{"s":"projects","t":"organizations","d":"SET NULL"},{"s":"quotation_approvals","t":"profiles","d":"SET NULL"},{"s":"quotation_approvals","t":"profiles","d":"SET NULL"},{"s":"quotation_approvals","t":"profiles","d":"SET NULL"},{"s":"quotation_approvals","t":"profiles","d":"SET NULL"},{"s":"quotation_approvals","t":"profiles","d":"RESTRICT"},{"s":"quotation_approvals","t":"quotations","d":"CASCADE"},{"s":"quotation_files","t":"quotations","d":"CASCADE"},{"s":"quotation_files","t":"profiles","d":"SET NULL"},{"s":"quotation_lines","t":"products","d":"SET NULL"},{"s":"quotation_lines","t":"quotations","d":"CASCADE"},{"s":"quotation_status_history","t":"profiles","d":"SET NULL"},{"s":"quotation_status_history","t":"quotations","d":"CASCADE"},{"s":"quotations","t":"deals","d":"SET NULL"},{"s":"quotations","t":"organizations","d":"RESTRICT"},{"s":"quotations","t":"contacts","d":"SET NULL"},{"s":"quotations","t":"payment_terms","d":"NO ACTION"},{"s":"quotations","t":"quotations","d":"SET NULL"},{"s":"quotations","t":"quotation_terms_templates","d":"SET NULL"},{"s":"rep_pipeline_assignments","t":"pipelines","d":"CASCADE"},{"s":"rep_pipeline_assignments","t":"profiles","d":"CASCADE"},{"s":"rep_plan_assignments","t":"commission_plans","d":"NO ACTION"},{"s":"rep_plan_assignments","t":"profiles","d":"CASCADE"},{"s":"sales_team_approval_steps","t":"sales_teams","d":"CASCADE"},{"s":"sales_team_approval_steps","t":"profiles","d":"RESTRICT"},{"s":"sales_team_members","t":"sales_teams","d":"CASCADE"},{"s":"sales_team_members","t":"profiles","d":"CASCADE"},{"s":"sales_teams","t":"profiles","d":"SET NULL"},{"s":"stage_history","t":"deals","d":"CASCADE"},{"s":"stage_history","t":"profiles","d":"NO ACTION"},{"s":"stalled_notification_log","t":"deals","d":"CASCADE"},{"s":"stalled_notification_log","t":"profiles","d":"CASCADE"},{"s":"target_milestone_log","t":"profiles","d":"CASCADE"},{"s":"targets","t":"profiles","d":"CASCADE"},{"s":"team_targets","t":"sales_teams","d":"CASCADE"}]};
const CARD_W=232, ROW_H=20, HEAD_H=28, MORE_H=18, REGION_PAD=22, CARD_GAP=16, COL_GAP=24, REGION_GAP=64, TITLE_H=20;
const MAX_INNER=3, PER_COL=8, MAX_ROW_W=5200;

const colorOf={}; DATA.domains.forEach(d=>colorOf[d.key]=d.color);
function cardHeight(m){ return HEAD_H + m.cols.length*ROW_H + (m.others>0?MORE_H:0); }

// ---- layout ----
const layout={}; // table -> {x,y,w,h}
const regions=[];
const byDomain={}; DATA.domains.forEach(d=>byDomain[d.key]=[]);
Object.entries(DATA.tables).forEach(([t,m])=>byDomain[m.domain].push(t));
// hubs first inside a domain
const HUB=['profiles','organizations','contacts','deals','quotations','contracts','projects','estimates','presales_tasks','lead_assessments','commission_plans','notifications','activities'];
for(const k in byDomain){ byDomain[k].sort((a,b)=>{const ha=HUB.indexOf(a),hb=HUB.indexOf(b);return (ha<0?99:ha)-(hb<0?99:hb)|| a.localeCompare(b);}); }

let curX=0, curY=0, rowMaxH=0;
for(const d of DATA.domains){
  const ts=byDomain[d.key]; if(!ts.length) continue;
  const innerCols=Math.min(MAX_INNER, Math.ceil(ts.length/PER_COL));
  // distribute column-major
  const colArr=Array.from({length:innerCols},()=>[]);
  ts.forEach((t,i)=>colArr[i%innerCols].push(t));
  // compute region size
  const colHeights=colArr.map(col=>col.reduce((s,t)=>s+cardHeight(DATA.tables[t])+CARD_GAP,0));
  const regH=TITLE_H+REGION_PAD*2+Math.max(...colHeights);
  const regW=REGION_PAD*2 + innerCols*CARD_W + (innerCols-1)*COL_GAP;
  if(curX>0 && curX+regW>MAX_ROW_W){ curX=0; curY+=rowMaxH+REGION_GAP; rowMaxH=0; }
  const rx=curX, ry=curY;
  regions.push({label:d.label,color:d.color,x:rx,y:ry,w:regW,h:regH});
  // place cards
  colArr.forEach((col,ci)=>{
    let cy=ry+TITLE_H+REGION_PAD;
    const cx=rx+REGION_PAD+ci*(CARD_W+COL_GAP);
    for(const t of col){
      const m=DATA.tables[t]; const h=cardHeight(m);
      layout[t]={x:cx,y:cy,w:CARD_W,h,color:d.color};
      cy+=h+CARD_GAP;
    }
  });
  curX+=regW+REGION_GAP; rowMaxH=Math.max(rowMaxH,regH);
}
const worldW=Math.max(...Object.values(layout).map(l=>l.x+l.w))+REGION_PAD;
const worldH=Math.max(...regions.map(r=>r.y+r.h))+REGION_PAD;

// ---- render DOM ----
const world=document.getElementById('world');
const svg=document.getElementById('edges');
svg.setAttribute('width',worldW); svg.setAttribute('height',worldH);
world.style.width=worldW+'px'; world.style.height=worldH+'px';

for(const r of regions){
  const el=document.createElement('div'); el.className='region';
  el.style.cssText+=`left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px;border-color:${r.color}55`;
  el.innerHTML=`<div class="rt" style="color:${r.color}">${r.label}</div>`;
  world.appendChild(el);
}
const cardEls={};
for(const [t,l] of Object.entries(layout)){
  const m=DATA.tables[t];
  const el=document.createElement('div'); el.className='card'; el.dataset.t=t;
  el.style.cssText+=`left:${l.x}px;top:${l.y}px;width:${l.w}px`;
  let rows='';
  for(const c of m.cols){
    const key=c.pk?'🔑':(c.fk?'∞':'');
    const ref=c.ref?`<span class="ref">→ ${c.ref}</span>`:'';
    rows+=`<div class="r ${c.pk?'pk':''}"><span class="k">${key}</span><span class="n">${c.name}</span>${ref}</div>`;
  }
  const more=m.others>0?`<div class="more">+${m.others} คอลัมน์อื่น</div>`:'';
  const rc=m.rows!=null?`<span class="rc">${m.rows.toLocaleString()} แถว</span>`:'';
  el.innerHTML=`<div class="h" style="background:${l.color}"><span>${t}</span>${rc}</div>${rows}${more}`;
  world.appendChild(el); cardEls[t]=el;
}

// ---- edges ----
const NS='http://www.w3.org/2000/svg';
const edgeEls=[];
const adj={}; // table -> set of connected tables
function center(l){return {x:l.x+l.w/2,y:l.y+l.h/2};}
for(const e of DATA.edges){
  const a=layout[e.s], b=layout[e.t]; if(!a||!b||e.s===e.t) continue;
  const ca=center(a), cb=center(b);
  const p=document.createElementNS(NS,'path');
  const mx=(ca.x+cb.x)/2;
  p.setAttribute('d',`M${ca.x},${ca.y} C${mx},${ca.y} ${mx},${cb.y} ${cb.x},${cb.y}`);
  p.setAttribute('class','edge');
  p.dataset.s=e.s; p.dataset.t=e.t;
  svg.appendChild(p); edgeEls.push(p);
  (adj[e.s]||=new Set()).add(e.t); (adj[e.t]||=new Set()).add(e.s);
}

// ---- interactions: hover highlight ----
function setHot(t){
  const conn=adj[t]||new Set();
  Object.entries(cardEls).forEach(([k,el])=>{
    el.classList.toggle('hot',k===t);
    el.classList.toggle('dim', !(k===t||conn.has(k)));
  });
  edgeEls.forEach(p=>{
    const on=p.dataset.s===t||p.dataset.t===t;
    p.classList.toggle('hot',on); p.classList.toggle('dim',!on);
  });
}
function clearHot(){
  Object.values(cardEls).forEach(el=>el.classList.remove('hot','dim'));
  edgeEls.forEach(p=>p.classList.remove('hot','dim'));
}
Object.entries(cardEls).forEach(([t,el])=>{
  el.addEventListener('mouseenter',()=>setHot(t));
  el.addEventListener('mouseleave',clearHot);
});

// ---- zoom / pan ----
const stage=document.getElementById('stage');
let scale=1,tx=40,ty=40;
function apply(){ world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; }
function zoomAt(cx,cy,factor){
  const ns=Math.min(2.5,Math.max(0.06,scale*factor));
  tx=cx-(cx-tx)*(ns/scale); ty=cy-(cy-ty)*(ns/scale); scale=ns; apply();
  document.getElementById('zr').textContent=Math.round(scale*100)+'%';
}
stage.addEventListener('wheel',e=>{e.preventDefault();const r=stage.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:0.89);},{passive:false});
let drag=false,sx,sy;
stage.addEventListener('pointerdown',e=>{drag=true;sx=e.clientX-tx;sy=e.clientY-ty;stage.classList.add('drag');stage.setPointerCapture(e.pointerId);});
stage.addEventListener('pointermove',e=>{if(!drag)return;tx=e.clientX-sx;ty=e.clientY-sy;apply();});
stage.addEventListener('pointerup',e=>{drag=false;stage.classList.remove('drag');});
function fit(){
  const r=stage.getBoundingClientRect();
  const s=Math.min(r.width/(worldW+80),r.height/(worldH+80));
  scale=s; tx=(r.width-worldW*s)/2; ty=(r.height-worldH*s)/2; apply();
  document.getElementById('zr').textContent=Math.round(scale*100)+'%';
}
document.getElementById('zi').onclick=()=>{const r=stage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1.2);};
document.getElementById('zo').onclick=()=>{const r=stage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,0.83);};
document.getElementById('zr').onclick=()=>{const r=stage.getBoundingClientRect();scale=1;tx=40;ty=40;apply();document.getElementById('zr').textContent='100%';};
document.getElementById('fit').onclick=fit;
document.getElementById('edgeToggle').onchange=e=>{svg.style.display=e.target.checked?'block':'none';};

// search + domain filter
const search=document.getElementById('search');
search.addEventListener('input',()=>{
  const q=search.value.trim().toLowerCase();
  if(!q){clearHot();return;}
  const hit=Object.keys(cardEls).filter(t=>t.includes(q));
  Object.entries(cardEls).forEach(([t,el])=>el.classList.toggle('dim',!hit.includes(t)));
  edgeEls.forEach(p=>p.classList.add('dim'));
  if(hit.length===1){ // center on it
    const l=layout[hit[0]]; const r=stage.getBoundingClientRect();
    scale=Math.max(scale,0.8); tx=r.width/2-(l.x+l.w/2)*scale; ty=r.height/2-(l.y+l.h/2)*scale; apply();
    setHot(hit[0]);
  }
});
const domsel=document.getElementById('domsel');
domsel.innerHTML='<option value="">— ทุกโดเมน —</option>'+DATA.domains.map(d=>`<option value="${d.key}">${d.label}</option>`).join('');
domsel.onchange=()=>{
  const k=domsel.value;
  if(!k){clearHot();fit();return;}
  Object.entries(cardEls).forEach(([t,el])=>el.classList.toggle('dim',DATA.tables[t].domain!==k));
  const reg=regions.find(r=>r.label===DATA.domains.find(d=>d.key===k).label);
  const r=stage.getBoundingClientRect();
  const s=Math.min(r.width/(reg.w+120),r.height/(reg.h+120),1.4);
  scale=s; tx=(r.width-reg.w*s)/2-reg.x*s; ty=(r.height-reg.h*s)/2-reg.y*s; apply();
  document.getElementById('zr').textContent=Math.round(scale*100)+'%';
};

// legend + counts
document.getElementById('legendItems').innerHTML=DATA.domains.map(d=>{
  const n=byDomainCount(d.key);
  return `<div class="lg"><span class="sw" style="background:${d.color}"></span>${d.label} <span style="color:var(--muted)">(${n})</span></div>`;
}).join('');
function byDomainCount(k){return Object.values(DATA.tables).filter(m=>m.domain===k).length;}
document.getElementById('counts').textContent=`${Object.keys(DATA.tables).length} ตาราง · ${DATA.edges.length} ความสัมพันธ์`;

apply(); fit();
</script>
